# User App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/playmakerappicon.png"
  
  # Android configuration
  android_min_sdk_android: 21
  android_adaptive_icon_background: "#00BF63" # Green background (Playmaker brand color)
  android_adaptive_icon_foreground: "assets/images/playmakerappicon.png"
  
  # iOS configuration
  ios_content_json: "ios/Runner/Assets.xcassets/AppIcon.appiconset/Contents.json"
  
  # Remove old launcher icons
  remove_alpha_ios: true

