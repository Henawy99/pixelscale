name: promoapp
description: Playmaker Promo Display App - Streams match recordings on big screens

publish_to: 'none'

version: 1.0.5+1

# Al Baseet App Entry Point: lib/main_albaseet.dart
# Build command: flutter build apk -t lib/main_albaseet.dart

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Video playback
  video_player: ^2.8.2
  chewie: ^1.7.4
  
  # Supabase for fetching recordings
  supabase_flutter: ^2.3.4
  
  # UI
  google_fonts: ^6.1.0
  
  # Utilities
  intl: ^0.19.0
  wakelock_plus: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/images/
    - assets/videos/
